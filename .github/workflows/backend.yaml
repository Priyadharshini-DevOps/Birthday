name: Deploy Backend

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  deploy-backend:

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t birthday-app-backend ./backend

      - name: Tag Docker Image
        run: |
          docker tag birthday-app-backend:latest ${{ secrets.BACKEND_ECR }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.BACKEND_ECR }}:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.BACKEND_SERVICE }} \
            --force-new-deployment

      - name: Wait for Deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.BACKEND_SERVICE }}

      - name: Deployment Complete
        run: echo "Backend deployment completed successfully!"